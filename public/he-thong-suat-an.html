  var _Date = Date;
  var t = new _Date(); t.setHours(GIO_DEMO, PHUT_DEMO, 0, 0);
  var OFFSET = t.getTime() - _Date.now();
  function D(a,b,c,d,e,f,g){
    if (this instanceof D){
      switch(arguments.length){
        case 0: return new _Date(_Date.now()+OFFSET);
        case 1: return new _Date(a);
        default: return new _Date(a,b,c,d,e,f,g);
      }

})();

function tinhNhomTuoi(ngaySinh) {
  if (!ngaySinh) return 5;
  const now = new Date(), ns = new Date(ngaySinh);
  const months = (now.getFullYear() - ns.getFullYear()) * 12
    + (now.getMonth() - ns.getMonth())
    - (now.getDate() < ns.getDate() ? 1 : 0);
  if (months < 6) return 1;
  if (months < 12) return 2;
  if (months < 36) return 3;
  if (months < 72) return 4;
  return 5;
}
function tenNhom(n) {
  return ["","Dưới 6 tháng","6–12 tháng","1–3 tuổi","4–6 tuổi","7–15 tuổi"][n] || "";
}
function deXuatMac(nhom) { return nhom === 2 ? "Cháo" : "Cơm"; }
function taoMa(nhom, loai) {
  return `${nhom}BT·${loai === "Cháo" ? "ChPDV" : "CPDV"}`;
}
function formatCountdown(ms) {
  if (ms <= 0) return "Đã hết hạn";
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}g ${m}p còn lại`;
  if (m > 0) return `${m}p ${s}s còn lại`;
  return `${s}s còn lại`;
}

// ── Responsive: phát hiện desktop / mobile ──
function useIsDesktop() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const f = () => setW(window.innerWidth);
    window.addEventListener("resize", f);
    return () => window.removeEventListener("resize", f);
  }, []);
  return w >= 768;
}

function MaTag({ ma }) {

function DVCountdown({ cfg, daDong }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    if (daDong) return;
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, [daDong]);
  const dl = getDeadlineDate(cfg);
  const ms = dl - now;
  const expired = ms <= 0;
  const urgent = ms > 0 && ms < 30 * 60 * 1000;
  if (daDong) return <span style={{ fontSize:11, color:C.green, fontWeight:700 }}>✓ Đã gửi</span>;
  return <span style={{ fontSize:11, fontWeight:700, color: expired ? C.red : urgent ? C.orange : C.textMid }}>{expired ? "⛔ Hết hạn" : (urgent ? "⚠️ " : "⏱ ") + formatCountdown(ms)}</span>;
}

            ))}

    <div style={{ position:"fixed", inset:0, background:"#00000066", zIndex:100, display:"flex", alignItems:isDesktop?"center":"flex-end", justifyContent:"center", padding:isDesktop?16:0 }}>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
            <div>
              <div style={{ fontSize:16, fontWeight:800, color:C.text }}>{bn.ten}</div>
              <div style={{ fontSize:12, color:C.textLight }}>

            </div>
            <button onClick={onClose} style={{ background:C.grayLight, border:"none", borderRadius:"50%", width:32, height:32, fontSize:16, cursor:"pointer", color:C.textMid }}>×</button>

          <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
            <span style={{ background:C.primaryLight, color:C.primary, borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:700 }}>🍽 Bình thường</span>
            <span style={{ background:C.grayLight, color:C.gray, borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:600 }}>Nhóm {nhom} — {tenNhom(nhom)}</span>

          </div>
          {bn.traVe && <div style={{ background:C.redLight, color:C.red, borderRadius:8, padding:"8px 10px", fontSize:12, fontWeight:600, marginBottom:10 }}>↩️ KDD trả về{bn.traVe.gio?` (${bn.traVe.gio})`:""}: {bn.traVe.lyDo}. Sửa chế độ ăn rồi bấm Xác nhận để gửi lại.</div>}
          <div style={{ display:"flex", gap:6 }}>

              <button key={t.id} onClick={()=>setDetailTab(t.id)} style={{ flex:1, padding:"9px 0", border:"none", cursor:"pointer", fontSize:13, fontWeight:detailTab===t.id?700:500, background:"transparent", color:detailTab===t.id?C.primary:C.textLight, borderBottom:detailTab===t.id?`2.5px solid ${C.primary}`:`2.5px solid ${C.borderLight}` }}>{t.label}</button>

        </div>
        <div style={{ padding:"0 20px 20px" }}>

                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <span style={{ fontSize:12, fontWeight:700, color:C.text }}>{day.date}</span>
                    {day.tag && <span style={{ fontSize:10, fontWeight:700, background:C.greenLight, color:C.green, borderRadius:4, padding:"1px 6px" }}>{day.tag}</span>}
                  </div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {day.items.map((it, ii) => (
                      <div key={ii} style={{ border:`1px solid ${C.border}`, borderRadius:7, padding:"7px 10px", minWidth:96, background:C.grayLight, fontSize:12 }}>
                        <div style={{ fontWeight:700, color:C.primary, marginBottom:3 }}>{it.bua}</div>
                        <div style={{ color:C.text, marginBottom:2 }}>{it.loai}</div>
                        {it.chitiet && <div style={{ color:C.textMid, fontSize:11 }}>{it.chitiet}</div>}
                        {it.ma && <div style={{ color:C.textMid, fontSize:10, fontFamily:"monospace" }}>{it.ma}</div>}
                      </div>

                  </div>

          {detailTab === "dang_ky" && (<>
          <BuaSection bua="sang" /><BuaSection bua="trua" /><BuaSection bua="chieu" />
          <div style={{ marginTop:14 }}>
            <label style={{ fontSize:12, fontWeight:700, color:C.textMid, display:"block", marginBottom:6 }}>Ghi chú</label>
            <textarea value={form.ghiChu} onChange={e => setForm(f => ({ ...f, ghiChu:e.target.value }))} placeholder="Dị ứng, yêu cầu đặc biệt…" style={{ width:"100%", borderRadius:10, border:`1.5px solid ${C.border}`, padding:"10px 12px", fontSize:13, resize:"none", height:64, color:C.text, background:C.bg, boxSizing:"border-box", fontFamily:"inherit" }} />
          </div>
          {!showTamNguon ? (
            <button onClick={() => setShowTamNguon(true)} style={{ width:"100%", marginTop:12, padding:"10px", border:`1.5px dashed ${C.yellow}`, borderRadius:10, background:"transparent", color:C.yellow, fontSize:13, fontWeight:600, cursor:"pointer" }}>⏸ Ngưng có hạn</button>
          ) : (
            <div style={{ marginTop:12, padding:14, border:`1.5px solid ${C.yellow}`, borderRadius:12, background:C.yellowLight }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.yellow, marginBottom:10 }}>⏸ Ngưng có hạn</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {[{ label:"Từ ngày", key:"tuNgay", type:"date" },{ label:"Đến ngày", key:"denNgay", type:"date" },{ label:"Cữ bắt đầu", key:"tuCu", type:"select" },{ label:"Cữ kết thúc", key:"denCu", type:"select" }].map(f => (
                  <div key={f.key}>
                    <label style={{ fontSize:11, color:C.textMid, fontWeight:600, display:"block", marginBottom:4 }}>{f.label} <span style={{ color:C.red }}>*</span></label>
                    {f.type === "select"
                      ? <select value={tamNguon[f.key]} onChange={e => setTamNguon(t => ({ ...t, [f.key]:e.target.value }))} style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:13, background:C.white, color:C.text }}><option>Sáng</option><option>Trưa</option><option>Chiều</option></select>
                      : <input type="date" value={tamNguon[f.key]} onChange={e => setTamNguon(t => ({ ...t, [f.key]:e.target.value }))} style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:13, background:C.white, color:C.text, boxSizing:"border-box" }} />
                    }
                  </div>
                ))}
              </div>
              <div style={{ marginTop:8 }}>
                <label style={{ fontSize:11, color:C.textMid, fontWeight:600, display:"block", marginBottom:4 }}>Lý do <span style={{ color:C.red }}>*</span></label>
                <input value={tamNguon.lyDo} onChange={e => setTamNguon(t => ({ ...t, lyDo:e.target.value }))} placeholder="Nhập lý do ngưng…" style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:`1.5px solid ${C.border}`, fontSize:13, background:C.white, color:C.text, boxSizing:"border-box" }} />
              </div>
              <button onClick={() => setShowTamNguon(false)} style={{ marginTop:8, fontSize:12, color:C.textLight, background:"none", border:"none", cursor:"pointer", padding:0 }}>Huỷ</button>
            </div>
          )}
          <button onClick={onChuyenBenhLy} style={{ width:"100%", marginTop:10, padding:"10px", border:`1.5px solid ${C.orange}`, borderRadius:10, background:C.orangeLight, color:C.orange, fontSize:13, fontWeight:700, cursor:"pointer" }}>Chuyển sang suất ăn bệnh lý →</button>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:16 }}>
            <button onClick={onClose} style={{ padding:"12px", borderRadius:12, border:`1.5px solid ${C.border}`, background:C.white, color:C.textMid, fontSize:14, fontWeight:700, cursor:"pointer" }}>Huỷ</button>
            <button onClick={() => { if (canSave()) onSave(form, tamNguon); }} style={{ padding:"12px", borderRadius:12, border:"none", background:canSave()?C.primary:C.grayLight, color:canSave()?C.white:C.textLight, fontSize:14, fontWeight:700, cursor:canSave()?"pointer":"not-allowed" }}>Xác nhận</button>
          </div>
          {!canSave() && <div style={{ fontSize:11, color:C.orange, textAlign:"center", marginTop:6 }}>Vui lòng nhập lý do cho các bữa đã đổi sang Cơm</div>}
          </>)}
        </div>
      </div>
    </div>
  );
}

                  ? <div style={{ fontSize:11, color:C.textLight, fontStyle:"italic", textDecoration:"line-through", padding:"2px 0" }}>Hủy (XV)</div>
                  : <><BuaCell loai={getLoai(b)} chao={getChao(b)} nhom={nhom} />{daDung && <div style={{ fontSize:10, color:C.green, marginTop:2 }}>✓ đã dùng</div>}</>}
              </div>
              );
            })}
          </div>
          {bn.traVe && <div style={{ marginTop:8, fontSize:11, color:C.red, background:C.redLight, borderRadius:6, padding:"4px 8px" }}>↩️ KDD trả về{bn.traVe.gio?` (${bn.traVe.gio})`:""}: {bn.traVe.lyDo}</div>}
          {bn.xuatVien && <div style={{ marginTop:8, fontSize:11, color:"#0E7C66", background:"#E0F7F4", borderRadius:6, padding:"4px 8px" }}>🚪 Xuất viện {bn.xuatVien.gio} — cữ sáng đã dùng, vẫn phục vụ cữ trưa, đã hủy cữ chiều · sau 13:00 tự xóa khỏi danh sách</div>}
          {bn.ghiChu ? <div style={{ marginTop:8, fontSize:11, color:C.textMid, background:C.grayLight, borderRadius:6, padding:"4px 8px" }}>📝 {bn.ghiChu}</div> : null}
        </div>
      </div>
    </div>

}

function DichVuTab({ onChuyenBenhLy }) {
  const isDesktop = useIsDesktop();
  const [subTab, setSubTab] = useState("dich_vu");
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");
  const [checkedIds, setCheckedIds] = useState([]);
  const [bnMoi, setBnMoi] = useState(BN_MOI_INIT);
  const [bnCu, setBnCu] = useState(BN_CU_INIT);

  // Đọc danh sách Dịch vụ từ Supabase (nếu đã cấu hình); lỗi → giữ mock
  useEffect(() => {
    if (!(window.SUAT_DB && window.SUAT_DB.configured() && window.SUAT_DB.fetchBenhNhan)) return;
    window.SUAT_DB.fetchBenhNhan("DV").then(res => {
      if (!(res && !res.error && Array.isArray(res.data) && res.data.length)) return;
      const mapped = res.data.map(r => {
        const cs = r.chinh_sua || {};
        const o = {
          id: r.ma_bn, ten: r.ho_ten, ngaySinh: r.ngay_sinh, khoa: r.khoa,
          phong: r.phong, giuong: r.giuong, ghiChu: r.ghi_chu || "",
          status: r.trang_thai,
          chinhSua: cs.chinhSua || {}, chinhSua_chao: cs.chinhSua_chao || {},
          tramNguon: cs.tramNguon || null
        };
        if (cs.xuatVien) o.xuatVien = cs.xuatVien;
        if (cs.traVe) o.traVe = cs.traVe;
        return o;
      });
      setBnMoi(mapped.filter(b => b.status === "cho_xac_nhan"));
      setBnCu(mapped.filter(b => b.status !== "cho_xac_nhan"));
    });
  }, []);
  const [toast, setToast] = useState(null);
  const [daDong, setDaDong] = useState({ sang:false, trua:false, chieu:false });

  const showToast = (msg, color = C.green) => { setToast({ msg, color }); setTimeout(() => setToast(null), 2500); };
  const allBn = [...bnMoi, ...bnCu];
  const matchS = b => b.ten.toLowerCase().includes(search.toLowerCase()) || b.id.includes(search);
  const filteredMoi = bnMoi.filter(matchS);
  const filteredTraVe = bnCu.filter(b => b.status === "bi_tra_ve" && matchS(b));
  const filteredCu  = bnCu.filter(b => b.status !== "bi_tra_ve" && matchS(b));
  const toggleCheck = (id) => setCheckedIds(ids => ids.includes(id) ? ids.filter(x => x !== id) : [...ids, id]);

  const duyetHangLoat = () => {
    const ids = checkedIds.length > 0 ? checkedIds : bnMoi.map(b => b.id);
    const duyet = bnMoi.filter(b => ids.includes(b.id)).map(b => ({ ...b, status:"da_xac_nhan" }));
    if (window.SUAT_DB && window.SUAT_DB.configured()) {
      duyet.forEach(b => window.SUAT_DB.updateBenhNhan(b.id, "DV", { trang_thai:"da_xac_nhan" }));
    }
    setBnCu(prev => [...duyet, ...prev]);
    setBnMoi(prev => prev.filter(b => !ids.includes(b.id)));
    setCheckedIds([]);
    showToast(`Đã xác nhận ${duyet.length} bệnh nhân`);
  };

  const handleSave = (form, tamNguon) => {
    if (!selected) return;
    const updated = { ...selected, chinhSua:{ sang:form.sang, trua:form.trua, chieu:form.chieu }, chinhSua_chao:{ sang:form.sang==="Cháo"?form.chao_sang:null, trua:form.trua==="Cháo"?form.chao_trua:null, chieu:form.chieu==="Cháo"?form.chao_chieu:null }, ghiChu:form.ghiChu, tramNguon:tamNguon?.lyDo?tamNguon:null, status:"da_xac_nhan" };
    setBnMoi(prev => prev.filter(b => b.id !== selected.id));
    setBnCu(prev => { const ex = prev.find(b => b.id === selected.id); return ex ? prev.map(b => b.id===selected.id?updated:b) : [updated,...prev]; });
    // Ghi thay đổi món xuống DB (nếu đã cấu hình) — để F5 không bị mất
    if (window.SUAT_DB && window.SUAT_DB.configured()) {
      const cs = { chinhSua: updated.chinhSua, chinhSua_chao: updated.chinhSua_chao, tramNguon: updated.tramNguon };
      if (updated.xuatVien) cs.xuatVien = updated.xuatVien;
      if (updated.traVe) cs.traVe = updated.traVe;
      window.SUAT_DB.updateBenhNhan(updated.id, "DV", { trang_thai: updated.status, ghi_chu: updated.ghiChu || "", chinh_sua: cs });
    }
    setSelected(null);
    showToast("Đã lưu và xác nhận");
  };

  const handleChuyenBenhLyLocal = () => {
    const bn = selected;
    setBnMoi(prev => prev.filter(b => b.id !== bn.id));
    setBnCu(prev => prev.filter(b => b.id !== bn.id));
    // Ghi thật: đổi loại BN từ Dịch vụ → Bệnh lý (nếu đã cấu hình Supabase)
    if (window.SUAT_DB && window.SUAT_DB.configured()) {
      window.SUAT_DB.updateBenhNhan(bn.id, "DV", { loai_bn:"BL", trang_thai:"cho_xu_ly", nguon:"chuyen_dv" });
    }
    setSelected(null);
    showToast("Đã chuyển sang suất ăn bệnh lý", C.orange);
    setTimeout(() => onChuyenBenhLy(bn), 600);
  };

  const BUA_CU = { sang:"06:00", trua:"11:00", chieu:"17:00" };
  const handleGui = (bua) => {
    setDaDong(d => ({ ...d, [bua]:true }));
    const sanSang = allBn.filter(b=>b.status==="da_xac_nhan");
    showToast(`Đã gửi ${sanSang.length} suất cữ ${BUA_LABEL[bua]} cho Dinh dưỡng`);
    // ── Ghi thật lên Supabase (chỉ khi đã cấu hình) ──
    if (window.SUAT_DB && window.SUAT_DB.configured()) {
      try {
        const rows = sanSang.map(b => {
          const nhom = tinhNhomTuoi(b.ngaySinh);
          const mon  = (b.chinhSua && b.chinhSua[bua]) || deXuatMac(nhom);
          const chao = (b.chinhSua_chao && b.chinhSua_chao[bua]) || {};
          return {
            ma_bn: b.id, ho_ten: b.ten, khoa: b.khoa, phong: b.phong, giuong: b.giuong,
            ngay_sinh: b.ngaySinh, nhom_tuoi: nhom,
            cu: BUA_CU[bua], buoi: BUA_LABEL[bua],
            loai_food: mon === "Cháo" ? "chao" : "com",
            loai:      mon === "Cháo" ? "chao_dv" : "com_dv",
            loai_suat: "DV", bo_phan: "bep_dv",
            ma_che_do: taoMa(nhom, mon),
            xay: chao.xay === "Xay", nem: chao.nem === "Nêm",
            ghi_chu: b.ghiChu || "", trang_thai: "khoa_gui"
          };
        });
        if (rows.length) {
          window.SUAT_DB.insert(rows).then(res => {
            if (res && res.error) showToast("Lỗi gửi Supabase: " + (res.error.message || res.error), C.red);
            else showToast(`✓ Đã ghi ${rows.length} suất lên hệ thống`, C.green);
          });
        }
      } catch (e) { showToast("Lỗi xử lý dữ liệu: " + e.message, C.red); }
    }
  };

  const menuTuan = [
    { thu:"Thứ 2", com:"Cơm sườn + canh chua", chao:"Cháo gà" },
    { thu:"Thứ 3", com:"Cơm cá kho + rau muống", chao:"Cháo heo bằm" },
    { thu:"Thứ 4", com:"Cơm thịt kho + canh bí", chao:"Cháo thịt bò" },
    { thu:"Thứ 5", com:"Cơm gà luộc + canh rau", chao:"Cháo cá lóc" },
    { thu:"Thứ 6", com:"Cơm tôm rang + đậu bắp", chao:"Cháo sườn non" },
    { thu:"Thứ 7", com:"Cơm thịt heo quay", chao:"Cháo trứng" },
    { thu:"CN",    com:"Cơm gà xào sả ớt", chao:"Cháo đậu xanh" },
  ];

  return (
    <div style={{ padding:"16px" }}>
      {toast && <div style={{ position:"fixed", top:60, left:"50%", transform:"translateX(-50%)", background:toast.color, color:C.white, padding:"10px 20px", borderRadius:12, fontSize:14, fontWeight:700, zIndex:999, boxShadow:"0 4px 16px #0003", whiteSpace:"nowrap" }}>{toast.msg}</div>}

      {/* Sub-tabs dịch vụ */}

function isComboAllowed(a, b) { return BL_COMBOS.some(c => (c[0]===a&&c[1]===b)||(c[1]===a&&c[0]===b)); }
function calcAgeGroup(dob) {
  if (!dob) return null;
  const now = new Date(), bd = new Date(dob);
  let m = (now.getFullYear()-bd.getFullYear())*12 + (now.getMonth()-bd.getMonth());
  if (now.getDate() < bd.getDate()) m--;
  return BL_AGE_GROUPS.find(g => m>=g.min && m<g.max) || null;
}

const mkFood = () => ({ qty:"", cuSlots:[] });

function FoodRow({ foodId, label, codes, activeFoods, state, setState, disabledByMax, allSlotTimes }) {
  const { qty, cuSlots } = state;
  const timeOpts = CU_TIMES[foodId] || [];
  const hasML = ["sua_thuong","sua_dac_tri","sonde"].includes(foodId);
  const hasCodes = codes && codes.length > 0;
  const enabled = (() => {
    if (activeFoods.length === 0) return true;
    if (activeFoods.includes(foodId)) return true;
    return activeFoods.some(a => isComboAllowed(a, foodId));
  })();
  const active = Number(qty) > 0;
  const blocked = !enabled || (disabledByMax && !active);
  const otherTimes = allSlotTimes.filter(x => x.fid !== foodId).map(x => x.time);

  function setQty(v) {
    const n = Math.min(Number(v)||0, timeOpts.length);
    const usedTimes = [];
    const slots = Array.from({ length: n }, (_, i) => {
      if (cuSlots[i]) { usedTimes.push(cuSlots[i].time); return cuSlots[i]; }
      const avail = timeOpts.find(t => !usedTimes.includes(t)) || timeOpts[i] || "";
      usedTimes.push(avail);
      return { time: avail, ml:"", code:"" };
    });
    setState(p => ({ ...p, qty: String(n), cuSlots: slots }));
  }
  function upSlot(i, k, v) { setState(p => { const s=[...p.cuSlots]; s[i]={...s[i],[k]:v}; return {...p,cuSlots:s}; }); }

  return (
    <div style={{ borderBottom:"1px solid "+C.divider, background:active?C.greenLight:enabled?C.white:C.dimBg }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px 6px", opacity:blocked?0.4:1 }}>
        <span style={{ fontWeight:active?700:400, fontSize:13, minWidth:68, color:active?C.green:C.text }}>{label}</span>
        <input type="number" min="0" max={timeOpts.length} value={qty} disabled={blocked} onChange={e=>setQty(e.target.value)} placeholder="0"
          style={blInp({ width:48, textAlign:"center", fontSize:14, border:"1.5px solid "+(active?C.green:C.border), background:active?C.greenLight:C.white })} />
        <span style={{ fontSize:12, color:C.textMid }}>cữ</span>
        {!enabled && <span style={{ fontSize:11, color:C.dimTx, fontStyle:"italic" }}>Không khả dụng (combo)</span>}
        {enabled && !active && <span style={{ fontSize:11, color:C.textLight, fontStyle:"italic" }}>Nhập số cữ để khai báo</span>}
      </div>
      {active && (
        <div style={{ display:"flex", gap:8, overflowX:"auto", padding:"0 14px 10px", flexWrap:"wrap" }}>
          {cuSlots.map((slot, i) => {
            const dupInFood = cuSlots.some((s,j)=>j!==i&&s.time===slot.time);
            const dupCross  = otherTimes.includes(slot.time);
            const isDup = dupInFood || dupCross;
            return (
              <div key={i} style={{ border:"1.5px solid "+(isDup?C.red:C.border), borderRadius:8, padding:"8px 10px", minWidth:138, flexShrink:0, background:isDup?C.redLight:C.white }}>
                {isDup && <div style={{ fontSize:10, color:C.red, fontWeight:700, marginBottom:5 }}>⚠ Trùng giờ {dupCross?"(food khác)":""}</div>}
                <select value={slot.time} onChange={e=>upSlot(i,"time",e.target.value)} style={{ width:"100%", fontWeight:700, fontSize:12, borderRadius:5, border:"none", background:isDup?C.red:C.primary, color:"#fff", padding:"4px 6px", marginBottom:6, cursor:"pointer", outline:"none" }}>
                  {timeOpts.map(t => { const taken=cuSlots.some((s,j)=>j!==i&&s.time===t)||otherTimes.includes(t); return <option key={t} value={t} style={{background:C.white,color:taken?C.red:C.text}}>{t}{taken?" ⚠":""}</option>; })}
                </select>
                {hasML && (
                  <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:6 }}>
                    <input type="number" min="0" value={slot.ml} onChange={e=>upSlot(i,"ml",e.target.value)} placeholder="ml" style={blInp({width:64,textAlign:"center"})} />
                    <span style={{ fontSize:11, color:C.textMid }}>ml</span>
                  </div>
                )}
                {hasCodes && (
                  <select value={slot.code} onChange={e=>upSlot(i,"code",e.target.value)} style={{...blSelSt,width:"100%",fontSize:11}}>
                    <option value="">— mã —</option>
                    {codes.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  {id:"BN007",name:"Đinh Văn Em",    dob:"2017-08-03",ward:"Hô hấp",       room:"P.501–G.2"},
  {id:"BN008",name:"Cao Thị Phượng", dob:"2022-12-01",ward:"Nhi Tổng hợp", room:"P.207–G.1"},
];
const BL_MOCK_HISTORY = [
  {date:"2026-06-24",ma:"4TH01",items:[{food:"Sữa BT",cu:"03:00",ml:150,code:"SUA013"},{food:"Sữa BT",cu:"09:00",ml:150,code:"SUA013"},{food:"Sonde",cu:"06:00",ml:200,code:"BN-SS04"}]},
  {date:"2026-06-23",ma:"4TH01",items:[{food:"Sữa BT",cu:"03:00",ml:150,code:"SUA013"},{food:"Cháo",cu:"11:00",ml:null,code:null},{food:"Cháo",cu:"17:00",ml:null,code:null}]},
];
const NGUON_LABEL = {moi:"Mới nhập",chuyen_dv:"Từ DV",het_ngung:"Hết ngưng"};
const NGUON_BG    = {moi:C.primaryLight,chuyen_dv:"#FEF5EC",het_ngung:C.greenLight};
const NGUON_COLOR = {moi:C.primary,chuyen_dv:C.edit,het_ngung:C.green};

function BenhLyTab({ incoming, onConsumed }) {
  const isDesktop = useIsDesktop();
  const [bnList, setBnList]         = useState(BL_MOCK_BN_LIST);
  const [code, setCode]             = useState("");
  const [searchResults, setResults] = useState(null);
  const [patient, setPatient]       = useState(null);
  const [ageGroup, setAgeGroup]     = useState(null);
  const [blTab, setBlTab]           = useState("dang-ky");
  const [showNgung, setShowNgung]   = useState(false);
  const [dis, setDis]               = useState("");
  const [ord, setOrd]               = useState("");
  const [suaT, setSuaT]             = useState(mkFood());
  const [suaD, setSuaD]             = useState(mkFood());
  const [sonde, setSonde]           = useState(mkFood());
  const [chao, setChao]             = useState(mkFood());
  const [com, setCom]               = useState(mkFood());
  const [nutr, setNutr]             = useState({kcal:"",l:"",p:"",g:""});
  const [noteExtra, setNoteExtra]   = useState("");
  const [saveErr, setSaveErr]       = useState("");

  // Đọc danh sách bệnh nhân Bệnh lý từ Supabase (nếu đã cấu hình); lỗi → giữ mock
  useEffect(() => {
    if (!(window.SUAT_DB && window.SUAT_DB.configured() && window.SUAT_DB.fetchBenhNhan)) return;
    window.SUAT_DB.fetchBenhNhan("BL").then(res => {
      if (res && !res.error && Array.isArray(res.data) && res.data.length) {
        let mapped = res.data.map(r => ({
          id: r.ma_bn, name: r.ho_ten, dob: r.ngay_sinh, ward: r.khoa,
          room: (r.phong || r.giuong) ? ("P." + (r.phong || "") + "–G." + (r.giuong || "")) : "",
          status: r.trang_thai, ma: r.ma_benh_ly, nguon: r.nguon
        }));
        // Giữ BN vừa chuyển từ DV nếu DB chưa kịp cập nhật (tránh mất do tải lại)
        if (incoming && !mapped.some(b => b.id === incoming.id)) mapped = [mapDVtoBL(incoming), ...mapped];
        setBnList(mapped);
      }
    });
  }, []);

  // Nhận BN được chuyển từ tab Dịch vụ → thêm vào danh sách Bệnh lý (nhóm Chờ xử lý)
  useEffect(() => {
    if (!incoming) return;
    setBnList(prev => prev.some(b => b.id === incoming.id) ? prev : [mapDVtoBL(incoming), ...prev]);
    onConsumed && onConsumed();
  }, [incoming]);

  function search() {
    if (!code.trim()) return;
    const q = code.toLowerCase();
    setResults(BL_MOCK_PATIENTS.filter(p => p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.room.toLowerCase().includes(q)));
  }
  function selectPatient(p) {
    setPatient(p); setAgeGroup(calcAgeGroup(p.dob)); setBlTab("dang-ky"); setSaveErr("");
    setDis(""); setOrd(""); setSuaT(mkFood()); setSuaD(mkFood()); setSonde(mkFood()); setChao(mkFood()); setCom(mkFood());
    setNutr({kcal:"",l:"",p:"",g:""}); setNoteExtra("");
  }
  function closePatient() { setPatient(null); setAgeGroup(null); }

  const foodList = [{id:"sua_thuong",s:suaT},{id:"sua_dac_tri",s:suaD},{id:"sonde",s:sonde},{id:"chao",s:chao},{id:"com",s:com}];
  const activeFoods  = foodList.filter(f=>Number(f.s.qty)>0).map(f=>f.id);
  const allSlotTimes = foodList.flatMap(f=>f.s.cuSlots.map(s=>({fid:f.id,time:s.time})));
  const totalCu      = foodList.reduce((s,f)=>s+(Number(f.s.qty)||0),0);
  const maBenhLy     = ageGroup&&dis&&ord ? ageGroup.prefix+dis+String(ord).padStart(2,"0") : null;
  const suaDCodes    = dis ? (SUA_DAC_TRI_CODES[dis]||[]) : [];
  const MAX_CU       = 8;
  const disabledByMax = totalCu >= MAX_CU;

  function validate() {
    if (!maBenhLy) { setSaveErr("Vui lòng chọn mã bệnh và số thứ tự."); return false; }
    if (totalCu < 1) { setSaveErr("Cần ít nhất 1 cữ ăn."); return false; }
    setSaveErr(""); return true;
  }

  const traVeBN = bnList.filter(b=>b.status==="bi_tra_ve" && !b.xuatVien);
  const choBN = bnList.filter(b=>b.status==="cho_xu_ly" && !b.xuatVien);
  const daBN  = bnList.filter(b=>b.status==="da_xu_ly" && !b.xuatVien);
  const xuatVienBN = bnList.filter(b=>b.xuatVien);

  function BLBNRow({ bn, isNew }) {
    return (
      <div onClick={()=>selectPatient(bn)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",background:C.white,borderBottom:"1px solid "+C.divider}} onMouseEnter={e=>e.currentTarget.style.background=C.primaryLight} onMouseLeave={e=>e.currentTarget.style.background=C.white}>
        <div style={{width:34,height:34,borderRadius:"50%",background:isNew?C.edit:C.primary,color:"#fff",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>{bn.name.split(" ").pop().charAt(0)}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{fontSize:13,fontWeight:700}}>{bn.name}</span>
            {bn.ma && <BLChip bg={C.greenLight} color={C.green}>{bn.ma}</BLChip>}
            <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:4,background:NGUON_BG[bn.nguon],color:NGUON_COLOR[bn.nguon]}}>{NGUON_LABEL[bn.nguon]}</span>
            {bn.tamNgung && <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:4,background:C.yellowLight,color:C.yellow}}>⏸ Ngưng đến {bn.tamNgung.denCu} · {bn.tamNgung.denNgay}</span>}
            {bn.traVe && <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:4,background:C.redLight,color:C.red}}>↩️ KDD trả về</span>}
          </div>
          <div style={{fontSize:11,color:C.textMid}}>{bn.ward} · {bn.room} · {bn.dob}</div>
          {bn.traVe && <div style={{fontSize:11,color:C.red,marginTop:2}}>↩️ {bn.traVe.lyDo}{bn.traVe.gio?` · ${bn.traVe.gio}`:""}</div>}
        </div>
        <span style={{fontSize:18,color:C.textLight}}>›</span>
      </div>
    );
  }

  return (
    <div style={{ maxWidth:isDesktop?980:860, margin:"0 auto", padding:"14px 12px" }}>
      {showNgung && <NgungModal onClose={()=>setShowNgung(false)} />}

      {!patient && (
        <div style={{ background:C.white, borderRadius:9, border:"1px solid "+C.border, overflow:"hidden", marginBottom:12 }}>
          <div style={{ padding:"10px 14px", borderBottom:"1px solid "+C.divider, display:"flex", gap:8 }}>
            <input value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="Tìm BN để bổ sung thêm..." style={blInp({flex:1,padding:"7px 10px",fontSize:13})} />
            <button onClick={search} style={{background:C.primary,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontWeight:600,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>+ Bổ sung</button>
          </div>
          {searchResults !== null && (
            <div style={{borderBottom:"1px solid "+C.divider}}>
              {searchResults.length===0 ? <div style={{padding:"10px 14px",fontSize:12,color:C.textMid,textAlign:"center"}}>Không tìm thấy</div>
                : searchResults.map((p,i)=>(
                  <div key={p.id} onClick={()=>selectPatient(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",cursor:"pointer",background:"#FFFBF0",borderBottom:i<searchResults.length-1?"1px solid "+C.border:"none"}} onMouseEnter={e=>e.currentTarget.style.background=C.primaryLight} onMouseLeave={e=>e.currentTarget.style.background="#FFFBF0"}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:C.edit,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{p.name.split(" ").pop().charAt(0)}</div>
                    <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700}}>{p.name}</div><div style={{fontSize:11,color:C.textMid}}>{p.id} · {p.ward} · {p.room}</div></div>
                    <span style={{fontSize:11,color:C.edit,fontWeight:600,flexShrink:0}}>+ Thêm ›</span>
                  </div>
                ))}
            </div>
          )}
          {traVeBN.length>0 && <div style={{padding:"6px 14px",background:C.redLight,borderBottom:"1px solid "+C.divider,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:10,fontWeight:700,color:C.red,textTransform:"uppercase",letterSpacing:0.5}}>↩️ Bị KDD trả về</span><span style={{fontSize:11,fontWeight:700,color:C.white,background:C.red,borderRadius:10,padding:"1px 7px"}}>{traVeBN.length}</span></div>}
          {traVeBN.map(bn=><BLBNRow key={bn.id} bn={bn} isNew={true} />)}
          {choBN.length>0 && <div style={{padding:"6px 14px",background:"#FEF5EC",borderBottom:"1px solid "+C.divider,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:10,fontWeight:700,color:C.edit,textTransform:"uppercase",letterSpacing:0.5}}>● Chờ xử lý</span><span style={{fontSize:11,fontWeight:700,color:C.edit,background:"#FDDBC7",borderRadius:10,padding:"1px 7px"}}>{choBN.length}</span></div>}
          {choBN.map(bn=><BLBNRow key={bn.id} bn={bn} isNew={true} />)}
          {choBN.length>0&&daBN.length>0&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 14px",background:C.grayLight,borderBottom:"1px solid "+C.divider}}><div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:10,color:C.textLight,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Đã xử lý</span><div style={{flex:1,height:1,background:C.border}}/></div>}
          {daBN.map(bn=><BLBNRow key={bn.id} bn={bn} isNew={false} />)}
          {xuatVienBN.length>0 && (
            <div style={{ padding:"8px 14px", background:C.grayLight, borderTop:"1px solid "+C.divider }}>
              <div style={{ fontSize:10, fontWeight:700, color:C.textLight, textTransform:"uppercase", letterSpacing:0.5, marginBottom:5 }}>🚪 Đã xuất viện — đã rời danh sách</div>
              {xuatVienBN.map(bn=>(
                <div key={bn.id} style={{ fontSize:12, color:C.textMid, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:2 }}>
                  <span style={{ textDecoration:"line-through" }}>{bn.name}</span>
                  <span style={{ fontSize:11, color:C.textLight }}>· {bn.room} · API xuất viện {bn.xuatVien.gio}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {patient && (
        <div>
          <div style={{ background:C.primaryLight, borderRadius:8, border:"1px solid "+C.border, overflow:"hidden", marginBottom:12 }}>
            <div style={{ display:"flex", alignItems:"center", padding:"10px 12px", gap:0 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:3 }}>
                  <span style={{ fontSize:14, fontWeight:700, whiteSpace:"nowrap" }}>{patient.name}</span>
                  <span style={{ fontSize:11, color:C.textMid, whiteSpace:"nowrap", flexShrink:0 }}>{patient.dob}</span>
                </div>
                <div style={{ fontSize:11, color:C.textMid, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{patient.ward} · {patient.room}</div>
              </div>
              <div style={{ display:"flex", gap:6, flexShrink:0, marginLeft:10 }}>
                <button onClick={()=>setShowNgung(true)} style={{background:C.green,color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>⏸ Ngưng</button>
                <button onClick={closePatient} style={{background:C.grayLight,color:C.textMid,border:"1px solid "+C.border,borderRadius:6,padding:"5px 10px",fontWeight:700,fontSize:13,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{ borderTop:"1px solid "+C.border, background:"rgba(255,255,255,0.55)", padding:"8px 12px", display:"flex", alignItems:"center", gap:6, flexWrap:"nowrap" }}>
              <span style={{ fontSize:11, color:C.textMid, fontWeight:600, flexShrink:0 }}>Mã :</span>
              <div style={{ padding:"4px 8px", borderRadius:5, flexShrink:0, background:C.dimBg, color:C.dimTx, fontSize:11, fontWeight:700, border:"1px solid "+C.border, whiteSpace:"nowrap" }}>{ageGroup ? ageGroup.prefix+" · "+ageGroup.label : "—"}</div>
              <span style={{ color:C.textLight, flexShrink:0 }}>+</span>
              <select value={dis} onChange={e=>{setDis(e.target.value);setOrd("");}} style={{...blSelSt,width:54,fontWeight:700,fontSize:13,textAlign:"center",padding:"4px 2px",flexShrink:0,border:"1.5px solid "+((!dis&&saveErr)?C.red:C.border)}}><option value="">--</option>{DISEASE_GROUPS.map(d=><option key={d.code} value={d.code}>{d.code}</option>)}</select>
              <span style={{ color:C.textLight, flexShrink:0 }}>+</span>
              <input type="number" min="1" max="9" value={ord} onChange={e=>setOrd(e.target.value)} disabled={!dis} placeholder="01" style={blInp({width:46,textAlign:"center",fontSize:13,flexShrink:0,fontWeight:600,padding:"4px 4px",opacity:dis?1:0.4,border:"1.5px solid "+((!ord&&saveErr)?C.red:C.border)})} />
              <div style={{ marginLeft:4, padding:"4px 12px", borderRadius:6, flexShrink:0, background:maBenhLy?C.greenLight:C.dimBg, border:"1.5px solid "+(maBenhLy?C.green:C.border), fontSize:15, fontWeight:800, color:maBenhLy?C.green:C.dimTx, letterSpacing:1.5, minWidth:70, textAlign:"center" }}>{maBenhLy||"—"}</div>
              {totalCu>0&&<div style={{marginLeft:"auto",flexShrink:0}}><BLChip bg={totalCu>=MAX_CU?C.redLight:C.greenLight} color={totalCu>=MAX_CU?C.red:C.green}>{totalCu}/{MAX_CU} cữ</BLChip></div>}
            </div>
          </div>

          <div style={{ background:C.white, borderRadius:9, border:"1px solid "+C.border, overflow:"hidden" }}>
            <div style={{ display:"flex", borderBottom:"1px solid "+C.divider }}>
              {[{id:"dang-ky",label:"📋 Đăng ký"},{id:"lich-su",label:"🕐 Lịch sử"}].map(t=>(
                <button key={t.id} onClick={()=>setBlTab(t.id)} style={{flex:1,padding:"10px 0",border:"none",cursor:"pointer",fontSize:13,fontWeight:blTab===t.id?700:400,background:blTab===t.id?C.white:C.grayLight,color:blTab===t.id?C.primary:C.textMid,borderBottom:blTab===t.id?"2px solid "+C.primary:"2px solid transparent"}}>{t.label}</button>
              ))}
            </div>

            {blTab==="lich-su" && (
              <div style={{padding:"12px 14px"}}>
                {BL_MOCK_HISTORY.map((day,di)=>(
                  <div key={di} style={{marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:12,fontWeight:700}}>{day.date}</span>
                      <BLChip bg={C.greenLight} color={C.green}>{day.ma}</BLChip>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {day.items.map((it,ii)=>(
                        <div key={ii} style={{border:"1px solid "+C.border,borderRadius:7,padding:"7px 10px",minWidth:110,background:C.grayLight,fontSize:12}}>
                          <div style={{fontWeight:700,color:C.primary,marginBottom:3}}>{it.cu}</div>
                          <div style={{color:C.text,marginBottom:2}}>{it.food}</div>
                          {it.ml&&<div style={{color:C.textMid,fontSize:11}}>{it.ml} ml</div>}
                          {it.code&&<div style={{color:C.textMid,fontSize:10}}>{it.code}</div>}
                        </div>
                      ))}
                    </div>
                    {di<BL_MOCK_HISTORY.length-1&&<div style={{height:1,background:C.divider,marginTop:14}}/>}
                  </div>
                ))}
              </div>
            )}

            {blTab==="dang-ky" && (
              <div>
                <div style={{padding:"7px 14px",background:C.grayLight,borderBottom:"1px solid "+C.divider,fontSize:10,fontWeight:700,color:C.textMid,textTransform:"uppercase",letterSpacing:0.5}}>Lựa chọn cữ ăn</div>
                <FoodRow foodId="sua_thuong" label="Sữa BT" codes={SUA_THUONG_CODES} activeFoods={activeFoods} state={suaT} setState={setSuaT} disabledByMax={disabledByMax} allSlotTimes={allSlotTimes} />
                <FoodRow foodId="sua_dac_tri" label="Sữa ĐB" codes={suaDCodes.length?suaDCodes:SUA_THUONG_CODES} activeFoods={activeFoods} state={suaD} setState={setSuaD} disabledByMax={disabledByMax} allSlotTimes={allSlotTimes} />
                <FoodRow foodId="sonde" label="Sonde" codes={SONDE_CODES} activeFoods={activeFoods} state={sonde} setState={setSonde} disabledByMax={disabledByMax} allSlotTimes={allSlotTimes} />
                <FoodRow foodId="chao" label="Cháo" codes={null} activeFoods={activeFoods} state={chao} setState={setChao} disabledByMax={disabledByMax} allSlotTimes={allSlotTimes} />
                <FoodRow foodId="com" label="Cơm" codes={null} activeFoods={activeFoods} state={com} setState={setCom} disabledByMax={disabledByMax} allSlotTimes={allSlotTimes} />
                <div style={{ borderTop:"1px solid "+C.divider, padding:"12px 14px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"nowrap", marginBottom:5 }}>
                    <span style={{fontSize:10,fontWeight:700,color:C.textMid,flexShrink:0}}>CAL</span>
                    <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                      <BLEditNum value={nutr.kcal} onChange={v=>setNutr(p=>({...p,kcal:v}))} w={60} />
                      <span style={{fontSize:10,color:C.textMid}}>kcal</span>
                    </div>
                    <div style={{width:1,height:20,background:C.divider,flexShrink:0,margin:"0 2px"}}/>
                    <span style={{fontSize:10,fontWeight:700,color:C.textMid,flexShrink:0}}>L/P/G</span>
                    {[{k:"l",l:"L"},{k:"p",l:"P"},{k:"g",l:"G"}].map(f=>(
                      <div key={f.k} style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
                        <span style={{fontSize:11,color:C.textMid,fontWeight:600}}>{f.l}</span>
                        <BLEditNum value={nutr[f.k]} onChange={v=>setNutr(p=>({...p,[f.k]:v}))} w={48} />
                        <span style={{fontSize:10,color:C.textMid}}>g</span>
                      </div>
                    ))}
                  </div>
                  {saveErr && <div style={{fontSize:11,color:C.red,background:C.redLight,borderRadius:6,padding:"7px 10px",marginBottom:10,lineHeight:1.5}}>⚠ {saveErr}</div>}
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.textMid,marginBottom:5,textTransform:"uppercase",letterSpacing:0.4}}>Ghi chú</div>
                    <textarea value={noteExtra} onChange={e=>setNoteExtra(e.target.value)} placeholder="Dị ứng, yêu cầu đặc biệt..." rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1.5px solid "+C.border,fontSize:12,resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>

                          ma_bn: patient.id, ho_ten: patient.name, khoa: patient.ward,

                          cu: s.time, buoi: buoiOf(s.time),
                          loai_food: f.food, loai: f.loai, loai_suat: "BL", bo_phan: f.bp,
                          ma_che_do: f.code ? (s.code || "") : maBenhLy, dis: dis,
                          kcal: Number(nutr.kcal)||null, protein_g: Number(nutr.p)||null,
                          lipid_g: Number(nutr.l)||null, glucid_g: Number(nutr.g)||null,
                          xay: false, nem: false, ghi_chu: noteExtra || "", trang_thai: "khoa_gui"
                        }); }); });
                        if (!rows.length) { alert("Chưa có cữ nào để gửi."); return; }
                        window.SUAT_DB.insert(rows).then(res => {
                          if (res && res.error) alert("Lỗi gửi Supabase: " + (res.error.message || res.error));
                          else { window.SUAT_DB.updateBenhNhan(patient.id, "BL", { trang_thai:"da_xu_ly", ma_benh_ly:maBenhLy }); setBnList(prev => prev.map(b => b.id===patient.id ? {...b, status:"da_xu_ly", ma:maBenhLy} : b)); alert(`✓ Đã ghi ${rows.length} suất bệnh lý lên hệ thống`); closePatient(); }
                        });
                      } catch (e) { alert("Lỗi xử lý: " + e.message); }
                    }} style={{flex:2,background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:"10px 0",fontWeight:700,cursor:"pointer",fontSize:14}}>Lưu & Duyệt →</button>
                  </div>

      )}

  );
}

function useCountdown(targetMs) {
  const [diff, setDiff] = useState(targetMs - Date.now());
  useEffect(() => { const t = setInterval(()=>setDiff(targetMs-Date.now()),1000); return ()=>clearInterval(t); }, [targetMs]);
  if (diff <= 0) return null;
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  if (h>0) return `${h}g ${m}p`;
  if (m>0) return `${m}p ${s}s`;
  return `${s}s`;
}

function GuiDinhDuongTab() {
  const isDesktop = useIsDesktop();
  const [buoiList, setBuoiList] = useState(BUOI_DATA_INIT);
  const [modalBuoi, setModalBuoi] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);
  const [dvDb, setDvDb] = useState(null);

  // Đọc bệnh nhân Dịch vụ từ DB để gửi theo danh sách thật (fallback mock nếu lỗi)
  useEffect(() => {
    if (!(window.SUAT_DB && window.SUAT_DB.configured() && window.SUAT_DB.fetchBenhNhan)) return;
    window.SUAT_DB.fetchBenhNhan("DV").then(res => {
      if (res && !res.error && Array.isArray(res.data)) {
        setDvDb(res.data.map(r => {
          const cs = r.chinh_sua || {};
          return { id:r.ma_bn, ten:r.ho_ten, ngaySinh:r.ngay_sinh, khoa:r.khoa, phong:r.phong, giuong:r.giuong, ghiChu:r.ghi_chu||"", status:r.trang_thai, chinhSua:cs.chinhSua||{}, chinhSua_chao:cs.chinhSua_chao||{} };
        }));
      }
    });
  }, []);

  function showToast(msg) { setToastMsg(msg); setTimeout(()=>setToastMsg(null),3000); }

  function handleConfirm() {
    // CHẶN THEO GIỜ: quá deadline cữ thì không cho gửi/cập nhật
    var _cfg = DOT_CONFIG.find(function (c) { return c.id === modalBuoi.id; });
    if (_cfg && new Date() > getDeadlineDate(_cfg)) { showToast("🔒 Đã quá giờ chốt " + modalBuoi.ten + " — không thể gửi/cập nhật"); setModalBuoi(null); return; }
    const now = new Date();
    const gio = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    setBuoiList(prev => prev.map(b => b.id!==modalBuoi.id ? b : {...b,guiLog:[...b.guiLog,{gio,dvCount:b.dvCu.length,blCount:b.blSan.length}]}));
    const daGui = modalBuoi.guiLog.length > 0;
    showToast(daGui ? `Đã cập nhật ${modalBuoi.ten} lúc ${gio}` : `Đã gửi ${modalBuoi.ten} lúc ${gio}`);
    // ── Ghi thật lên Supabase: suất cơm/cháo DV của buổi này ──
    if (window.SUAT_DB && window.SUAT_DB.configured()) {
      try {
        const BUA_CU = { sang:"06:00", trua:"11:00", chieu:"17:00" };
        const BUA_LB = { sang:"Sáng", trua:"Trưa", chieu:"Chiều" };
        const bua = modalBuoi.id;
        const dvPatients = (dvDb || [...BN_MOI_INIT, ...BN_CU_INIT]).filter(b => b.status === "da_xac_nhan");
        const rows = dvPatients.map(b => {
          const nhom = tinhNhomTuoi(b.ngaySinh);
          const mon  = (b.chinhSua && b.chinhSua[bua]) || deXuatMac(nhom);
          const chao = (b.chinhSua_chao && b.chinhSua_chao[bua]) || {};
          return {
            ma_bn: b.id, ho_ten: b.ten, khoa: b.khoa, phong: b.phong, giuong: b.giuong,
            ngay_sinh: b.ngaySinh, nhom_tuoi: nhom,
            cu: BUA_CU[bua], buoi: BUA_LB[bua],
            loai_food: mon === "Cháo" ? "chao" : "com",
            loai:      mon === "Cháo" ? "chao_dv" : "com_dv",
            loai_suat: "DV", bo_phan: "bep_dv",
            ma_che_do: taoMa(nhom, mon),
            xay: chao.xay === "Xay", nem: chao.nem === "Nêm",
            ghi_chu: b.ghiChu || "", trang_thai: "khoa_gui"
          };
        });
        if (rows.length) {
          window.SUAT_DB.insert(rows).then(res => {
            if (res && res.error) showToast("Lỗi gửi Supabase: " + (res.error.message || res.error));
            else showToast(`✓ Đã ghi ${rows.length} suất lên hệ thống`);
          });
        }
      } catch (e) { showToast("Lỗi xử lý dữ liệu: " + e.message); }
    }
    setModalBuoi(null);
  }

  const tongSan = buoiList.reduce((s,b)=>s+b.dvCu.length+b.blSan.length,0);
  const tongChua = buoiList.reduce((s,b)=>s+b.dvMoi.length+b.blChua.length,0);

  return (
    <div style={{ padding:16, maxWidth:isDesktop?920:480, margin:"0 auto" }}>
      <div style={{ background:C.white, borderRadius:12, padding:"14px 16px", marginBottom:16, border:`1px solid ${C.borderLight}` }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.textLight, marginBottom:10 }}>TỔNG QUAN HÔM NAY</div>
        <div style={{ display:"flex", gap:10 }}>
          <div style={{ flex:1, textAlign:"center" }}><div style={{ fontSize:24, fontWeight:800, color:C.primary }}>{tongSan}</div><div style={{ fontSize:11, color:C.textMid }}>BN sẵn sàng</div></div>
          <div style={{ width:1, background:C.borderLight }} />
          <div style={{ flex:1, textAlign:"center" }}><div style={{ fontSize:24, fontWeight:800, color:tongChua>0?C.orange:C.green }}>{tongChua}</div><div style={{ fontSize:11, color:C.textMid }}>Chưa xác nhận</div></div>
          <div style={{ width:1, background:C.borderLight }} />
          <div style={{ flex:1, textAlign:"center" }}><div style={{ fontSize:24, fontWeight:800, color:C.text }}>{buoiList.filter(b=>b.guiLog.length>0).length}/3</div><div style={{ fontSize:11, color:C.textMid }}>Buổi đã gửi</div></div>
        </div>
      </div>
      <div style={{ background:C.primaryLight, borderRadius:10, padding:"10px 14px", marginBottom:16, fontSize:12, color:C.primary, border:`1px solid ${C.primaryMid}` }}>
        <div style={{ fontWeight:700, marginBottom:4 }}>Bệnh lý gộp theo buổi:</div>
        <div>· Trưa — Cữ 3 (12:00)</div>
        <div>· Chiều-Tối — Cữ 4→8 (15:00 → 03:00)</div>
        <div>· Sáng (mai) — Cữ 1 (06:00) · Cữ 2 (09:00)</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:isDesktop?"1fr 1fr 1fr":"1fr", gap:12, alignItems:"start" }}>
        {buoiList.map(b=><BuoiCard key={b.id} buoi={b} onGui={setModalBuoi} />)}
      </div>
      {modalBuoi && <ModalXacNhan buoi={modalBuoi} onConfirm={handleConfirm} onCancel={()=>setModalBuoi(null)} />}
      {toastMsg && <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:C.header, color:C.white, padding:"10px 20px", borderRadius:24, fontSize:13, fontWeight:600, boxShadow:"0 4px 16px rgba(0,0,0,0.2)", whiteSpace:"nowrap", zIndex:200 }}>✓ {toastMsg}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ══  MAIN APP  ═════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
const MAIN_TABS = [
  { id:"dich_vu", label:"Dịch vụ",       icon:"🍽" },
  { id:"benh_ly", label:"Bệnh lý",        icon:"🏥" },
  { id:"gui",     label:"Gửi dinh dưỡng", icon:"📤" },
];

// ── Dashboard tổng quan toàn khoa (DV + BL) — luôn hiển thị ──
function DeptDashboard({ onGoToGui }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(t); }, []);
  // Số lượng bệnh nhân toàn khoa (Dịch vụ + Bệnh lý)
  const dvList = [...BN_MOI_INIT, ...BN_CU_INIT];
  const blList = BL_MOCK_BN_LIST;
  const dvTong = dvList.length;
  const blTong = blList.length;
  const tongBN = dvTong + blTong;
  const chuaXuLy = dvList.filter(b => b.status === "cho_xac_nhan").length + blList.filter(b => b.status === "cho_xu_ly").length;
  const traVe = dvList.filter(b => b.status === "bi_tra_ve").length + blList.filter(b => b.status === "bi_tra_ve").length;

  // Gửi cữ (phụ — hiển thị nhỏ hơn)
  const buoi = BUOI_DATA_INIT;
  const daGui   = buoi.filter(b => b.guiLog.length > 0).length;
  const chuaGui = buoi.filter(b => b.guiLog.length === 0 && !b.locked);
  const sapDeadline = chuaGui.filter(b => (b.deadlineMs - now) > 0 && (b.deadlineMs - now) < 3 * 60 * 60 * 1000);
  const fmt = (ms) => { const m = Math.floor(ms/60000); const h = Math.floor(m/60); return h>0?`${h}g${m%60}p`:`${m}p`; };
  const sapNhat = sapDeadline.length ? sapDeadline.reduce((a,b)=> (a.deadlineMs<b.deadlineMs?a:b)) : null;

  const bigCard = (bg, border) => ({ flex:"1 1 0", minWidth:150, background:bg, border:`1px solid ${border}`, borderRadius:12, padding:"10px 14px" });

  return (
    <div style={{ paddingBottom:12 }}>
      <div style={{ fontSize:10, color:"rgba(255,255,255,0.75)", fontWeight:700, letterSpacing:0.6, marginBottom:6 }}>SỐ LƯỢNG BỆNH NHÂN TOÀN KHOA</div>
      {/* Hàng chính: số bệnh nhân (to) */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <div style={bigCard("rgba(255,255,255,0.18)", "rgba(255,255,255,0.28)")}>
          <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
            <span style={{ fontSize:28, fontWeight:800, color:"#fff", lineHeight:1 }}>{tongBN}</span>
            <span style={{ fontSize:11, color:"rgba(255,255,255,0.9)", fontWeight:600 }}>Tổng BN toàn khoa</span>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <span style={{ fontSize:12, color:"#fff", background:"rgba(255,255,255,0.18)", borderRadius:7, padding:"3px 9px", fontWeight:600 }}>🍽 {dvTong} Dịch vụ</span>
            <span style={{ fontSize:12, color:"#fff", background:"rgba(255,255,255,0.18)", borderRadius:7, padding:"3px 9px", fontWeight:600 }}>🏥 {blTong} Bệnh lý</span>
          </div>
        </div>
        <div style={bigCard(chuaXuLy>0?"rgba(243,156,18,0.28)":"rgba(255,255,255,0.18)", chuaXuLy>0?"rgba(243,156,18,0.5)":"rgba(255,255,255,0.28)")}>
          <div style={{ fontSize:28, fontWeight:800, color:"#fff", lineHeight:1 }}>{chuaXuLy}</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.9)", fontWeight:600, marginTop:6 }}>Chưa xác nhận / xử lý</div>
        </div>
      </div>
      {/* Hàng phụ: gửi cữ (nhỏ) */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:8, padding:"6px 12px", background:"rgba(255,255,255,0.1)", borderRadius:10, flexWrap:"wrap" }}>
        <span style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.7)", letterSpacing:0.5 }}>GỬI CỮ</span>
        <span style={{ fontSize:12, color:"#fff" }}>✅ <strong>{daGui}/3</strong> đã gửi</span>
        <span style={{ color:"rgba(255,255,255,0.35)" }}>·</span>
        <span style={{ fontSize:12, color:"#fff" }}>📤 <strong>{chuaGui.length}</strong> chưa gửi</span>
        <span style={{ color:"rgba(255,255,255,0.35)" }}>·</span>
        <span onClick={onGoToGui} style={{ fontSize:12, color:"#fff", cursor:"pointer", fontWeight:sapDeadline.length?700:400, background:sapDeadline.length?"rgba(243,156,18,0.95)":"transparent", borderRadius:6, padding:sapDeadline.length?"2px 8px":"0" }}>⏰ <strong>{sapDeadline.length}</strong> sắp deadline</span>
      </div>
      {sapNhat && (
        <div onClick={onGoToGui} style={{ marginTop:8, background:"rgba(243,156,18,0.95)", color:"#fff", borderRadius:10, padding:"8px 12px", fontSize:12, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
          ⚠️ Cần gửi gấp: <strong>{sapNhat.ten}</strong> — còn {fmt(sapNhat.deadlineMs - now)} → bấm để gửi
        </div>
      )}
      {traVe > 0 && (
        <div style={{ marginTop:8, background:"rgba(192,57,43,0.95)", color:"#fff", borderRadius:10, padding:"8px 12px", fontSize:12, fontWeight:600 }}>
          ↩️ {traVe} suất bị KDD trả về — cần chỉnh sửa & gửi lại
        </div>
      )}
    </div>
  );
}

function App() {
  const [mainTab, setMainTab] = useState("dich_vu");
  const [chuyenBN, setChuyenBN] = useState(null);
  const isDesktop = useIsDesktop();

  return (
    <div style={{ background:C.bg, minHeight:"100vh", fontFamily:"system-ui, sans-serif", maxWidth: isDesktop ? 1080 : 560, margin:"0 auto" }}>
      <div style={{ background:"linear-gradient(135deg, #2563EB 0%, #6D28D9 100%)", padding:"14px 20px 0", position:"sticky", top:0, zIndex:50, boxShadow:"0 2px 12px rgba(76,29,149,0.25)" }}>
        <div style={{ fontSize:10, color:"rgba(255,255,255,0.8)", fontWeight:700, letterSpacing:0.8, marginBottom:2 }}>BỆNH VIỆN NHI · KHOA LÂM SÀNG · 🟢 v7 SUPABASE</div>
        <div style={{ fontSize:19, fontWeight:800, color:C.white, marginBottom:12 }}>Hệ thống đăng ký suất ăn</div>
        <DeptDashboard onGoToGui={() => setMainTab("gui")} />
        <div style={{ display:"flex", gap:2 }}>
          {MAIN_TABS.map(t => (
            <button key={t.id} onClick={() => setMainTab(t.id)} style={{
              flex:1, padding:"10px 8px 11px", border:"none", cursor:"pointer",
              background: mainTab===t.id ? "rgba(255,255,255,0.16)" : "transparent",
              borderBottom: mainTab===t.id ? "3px solid #fff" : "3px solid transparent",
              borderRadius:"8px 8px 0 0",
              fontSize:12, fontWeight:mainTab===t.id?700:500,
              color:mainTab===t.id?"#fff":"rgba(255,255,255,0.7)",
              transition:"all 0.15s",
            }}>
              <span style={{ marginRight:5 }}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ paddingBottom:20 }}>
        {mainTab === "dich_vu" && <DichVuTab onChuyenBenhLy={(bn) => { setChuyenBN(bn); setMainTab("benh_ly"); }} />}
        {mainTab === "benh_ly" && <BenhLyTab incoming={chuyenBN} onConsumed={() => setChuyenBN(null)} />}
        {mainTab === "gui"     && <GuiDinhDuongTab />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
