<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KDD — Duyệt &amp; chuyển sản xuất theo cữ</title>
<style>
  :root{
    --bg:#F0F4F8;--white:#FFFFFF;--border:#DDE3EA;--borderLight:#EEF2F5;
    --header:#0D1F2D;--primary:#0E6BA8;--primaryLight:#E6F2FA;--primaryMid:#C2DCF0;
    --green:#0E8A5F;--greenLight:#E8F5EE;--orange:#E8650A;--orangeLight:#FFF0E6;
    --red:#C0392B;--redLight:#FDECEA;--yellow:#9A7200;--yellowLight:#FFFBEA;
    --gray:#546E7A;--grayLight:#EEF2F4;--grayMid:#8A9BB0;
    --text:#0D1F2D;--textMid:#4A5568;--textLight:#8A9BB0;--dimBg:#F4F6F8;--dimTx:#AEB8C4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
  .hd{background:var(--header);padding:14px 18px 0}
  .hd .k{font-size:11px;font-weight:700;color:#5B8FAA;letter-spacing:1px}
  .hd .t{font-size:18px;font-weight:800;color:#fff;margin:2px 0 10px}
  .tabs{display:flex;gap:4px}
  .tab{padding:10px 12px;cursor:pointer;font-size:12.5px;font-weight:500;color:#8FA9BC;border-bottom:2.5px solid transparent}
  .tab.on{color:#fff;font-weight:800;border-bottom-color:#5B8FAA}
  .wrap{padding:16px;max-width:1180px;margin:0 auto}
  .card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
  .row{display:flex;align-items:center}.between{justify-content:space-between}
  .gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.wrapf{flex-wrap:wrap}
  .cu{font-size:20px;font-weight:800}
  .pill{font-size:11px;font-weight:700;color:var(--primary);background:var(--primaryLight);border-radius:6px;padding:2px 8px;display:inline-block}
  .sub{font-size:11px;color:var(--textLight)}
  .badge{font-size:10px;font-weight:700;border-radius:99px;padding:3px 9px}
  .chip{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;margin:0 4px 4px 0}
  .chip .n{background:#fff;border-radius:4px;padding:0 5px}
  .bp-dv{background:var(--primaryLight);color:var(--primary)}
  .bp-bl{background:var(--greenLight);color:var(--green)}
  .bp-ss{background:var(--orangeLight);color:var(--orange)}
  .lbadge{border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700;margin-right:4px;display:inline-block}
  button{font-family:inherit;cursor:pointer}
  .b{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--textMid)}
  .b.out{border-color:var(--primary);color:var(--primary)}
  .b.pri{border:none;background:var(--primary);color:#fff}
  .b.grn{border:none;background:var(--green);color:#fff}
  .b.red{border-color:var(--red);color:var(--red);background:var(--redLight)}
  .b.sm{padding:5px 9px;font-size:11px}
  .b.block{background:var(--grayLight);color:var(--textLight)}
  .muted{text-align:center;padding:50px 0;color:var(--textLight)}
  .split{display:block}.queue{margin:0}.detailpane{display:none}
  @media(min-width:1024px){
    .split{display:flex;gap:16px;align-items:flex-start}
    .queue{width:340px;flex:none}
    .detailpane{display:block;flex:1;position:sticky;top:14px;max-height:calc(100vh - 28px);overflow:auto}
  }
  .qrow{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:10px;cursor:pointer}
  .qrow.sel{border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,107,168,.12)}
  .qrow.appr{border-color:var(--primaryMid)}
  .detailpane.open{display:block}
  @media(max-width:1023px){.detailpane.open{position:fixed;inset:0;background:var(--bg);z-index:60;overflow:auto;padding:12px;max-height:none}}
  .tool{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .tool input,.tool select{font-family:inherit;font-size:12px;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text)}
  .tool input{flex:1;min-width:120px}
  .kacc{border:1px solid var(--borderLight);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .khead{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:#fff}
  .khead:hover{background:var(--grayLight)}
  .kbody{padding:4px 12px 10px;border-top:1px solid var(--borderLight)}
  .trow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--borderLight)}
  .trow:last-child{border-bottom:none}
  .bninfo{flex:1;cursor:pointer;border-radius:8px;padding:2px 4px}
  .bninfo:hover{background:var(--primaryLight)}
  .tick{width:20px;height:20px;border-radius:5px;margin-top:2px;flex-shrink:0;border:2px solid var(--grayMid);background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
  .tick.on{border-color:var(--primary);background:var(--primary)}
  .flag{font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;background:var(--yellowLight);color:var(--yellow);margin-left:5px}
  .gc{font-size:10.5px;color:var(--textMid);margin-top:4px}
  .reason{width:100%;margin-top:6px;padding:6px 9px;border-radius:7px;border:1.5px solid var(--red);font-size:11px;font-family:inherit}
  .prog{font-size:11px;font-weight:700;color:var(--green);background:var(--greenLight);border-radius:99px;padding:2px 8px}
  .prog.part{color:var(--orange);background:var(--orangeLight)}
  .ov{position:fixed;inset:0;background:rgba(13,31,45,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .mod{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 8px 32px rgba(13,31,45,.18)}
  .mh{padding:15px 18px 11px;border-bottom:1px solid var(--borderLight);position:sticky;top:0;background:#fff}
  .x{background:var(--grayLight);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;color:var(--textMid)}
  .sechead{font-size:11px;font-weight:800;color:var(--textLight);letter-spacing:.5px;margin:14px 0 8px}
  .culine{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--borderLight);border-radius:9px;padding:8px 11px;margin-bottom:7px}
  .pane-foot{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:10px 0;margin-top:6px;display:flex;gap:10px}
  .mfoot{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:12px 18px;display:flex;gap:10px;align-items:center}
  .dim{background:var(--dimBg);border-radius:8px;padding:7px 10px;margin-top:4px;opacity:.8;font-size:11px;color:var(--dimTx)}
  .sent-cell{flex:1 1 30%;min-width:150px;border-radius:9px;padding:9px 11px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;z-index:200}
  .rfilter{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .frow{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
  .flbl{font-size:11px;font-weight:800;color:var(--textLight);width:62px;flex:none;padding-top:6px}
  .fchip{font-size:11px;font-weight:700;border:1.5px solid var(--border);border-radius:99px;padding:3px 10px;cursor:pointer;background:#fff;color:var(--textMid)}
  .fchip.on{border-color:var(--primary);background:var(--primaryLight);color:var(--primary)}
  .fkhoabox{display:flex;flex-wrap:wrap;gap:5px;max-height:96px;overflow:auto;flex:1}
  .dmt{width:100%;border-collapse:collapse;font-size:12px}
  .dmt th{text-align:left;color:var(--textLight);font-weight:700;padding:6px 8px;white-space:nowrap}
  .dmt td{padding:6px 8px;border-top:1px solid var(--borderLight);vertical-align:top}
  .dmt input.fcell{width:60px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit}
</style>

<script>
/* ===== DEMO: ép GIỜ HIỆN TẠI về HÔM NAY 11:00 để mở khóa cữ =====
   Sửa GIO_DEMO/PHUT_DEMO nếu cần giờ khác (vd 7 để mở cữ Trưa).
   XÓA cả block này sau khi demo xong. */
(function(){
  var GIO_DEMO = 11, PHUT_DEMO = 0;
  var _Date = Date;
  var t = new _Date(); t.setHours(GIO_DEMO, PHUT_DEMO, 0, 0);
  var OFFSET = t.getTime() - _Date.now();
  function D(a,b,c,d,e,f,g){
    if (this instanceof D){
      switch(arguments.length){
        case 0: return new _Date(_Date.now()+OFFSET);
        case 1: return new _Date(a);
        default: return new _Date(a,b,c,d,e,f,g);
      }
    }
    return new _Date(_Date.now()+OFFSET).toString();
  }
  D.now=function(){return _Date.now()+OFFSET;};
  D.parse=_Date.parse; D.UTC=_Date.UTC; D.prototype=_Date.prototype;
  window.Date=D;
  try{console.log("[DEMO] Giờ giả định:", new Date().toString());}catch(e){}
})();
</script>

function headerHTML(){
  var cho=ALL_CU.filter(function(g){return !state.sent[g];}).length,dagui=Object.keys(state.sent).length;
  var tabs=[["cho","Cữ chờ xử lý ("+cho+")"],["dagui","Đã gửi ("+dagui+")"],["tracuu","Tra cứu BN"],["danhmuc","Danh mục sữa"],["baocao","Báo cáo"]];
  var modeTxt=state.realMode?'🟢 SUPABASE (chạy thật)':'⚪ DEMO (dữ liệu mẫu)';
  var h='<div class="hd"><div class="k">KHOA DINH DƯỠNG · v7 · '+modeTxt+'</div><div class="t">Duyệt &amp; chuyển sản xuất theo cữ</div><div class="tabs">';
  tabs.forEach(function(t){h+='<div class="tab'+(state.tab===t[0]?' on':'')+'" data-act="tab" data-tab="'+t[0]+'">'+t[1]+'</div>';});
  return h+'</div></div>';
}
function bodyHTML(){
  if(state.tab==="cho"){
    var cu=ALL_CU.filter(function(g){return !state.sent[g];}).sort(function(a,b){return cuDiff(a)-cuDiff(b);});
    if(!cu.length)return '<div class="muted">Đã xử lý hết các cữ 🎉</div>';
    return '<div class="split"><div class="queue">'+cu.map(queueRowHTML).join("")+'</div><div class="detailpane'+(state.selCu?' open':'')+'">'+detailPaneHTML(state.selCu)+'</div></div>';
  }
  if(state.tab==="dagui")return tab2HTML();
  if(state.tab==="tracuu")return '<div style="position:relative;margin-bottom:14px;max-width:520px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--textLight)">🔍</span><input id="search" style="width:100%;padding:11px 12px 11px 34px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:inherit" placeholder="Tìm tên hoặc mã bệnh nhân…" value="'+state.dq.replace(/"/g,"&quot;")+'"></div><div id="tcres">'+tracuuResultsHTML()+'</div>';
  if(state.tab==="danhmuc")return danhMucHTML();
  if(state.tab==="baocao")return baocaoHTML();
  return "";
}
function tuoiChips(arr){return arr.map(function(n){return '<span class="lbadge bp-dv">'+n+'</span>';}).join("");}
function benhChips(arr){return arr.length?arr.map(function(b){return '<span class="lbadge bp-bl">'+b+'</span>';}).join(""):'<span class="sub">—</span>';}
function danhMucHTML(){
  var h='<div class="card"><div class="sechead" style="margin-top:0">QUY ĐỊNH CHỌN MÃ SỮA</div>';
  h+='<div class="sub" style="margin-bottom:12px;line-height:1.6">• <b>Sữa BT</b>: lọc theo <b>nhóm tuổi</b> (không xét bệnh). &nbsp; • <b>Sữa ĐB</b>: lọc theo <b>nhóm tuổi × mã bệnh</b>. &nbsp; • Công thức pha do KDD nhập/điều chỉnh.<br>Nhóm tuổi: <b>1</b>=&lt;6th · <b>2</b>=6–12th · <b>3</b>=1–3t · <b>4</b>=4–6t · <b>5</b>=7–15t</div>';
  h+='<div class="row between" style="margin-bottom:8px"><b style="font-size:13px">Bảng 1 — Mã sữa</b><button class="b sm out" data-act="addsua">+ Thêm mã</button></div>';
  h+='<div style="overflow:auto"><table class="dmt"><tr><th>Mã</th><th>Tên sữa</th><th>Loại</th><th>Nhóm tuổi</th><th>Mã bệnh</th><th>Bột(g)</th><th>Nước(ml)</th><th>TP(ml)</th><th>Trạng thái</th></tr>';
  SUA_CAT.forEach(function(s,i){
    h+='<tr'+(s.on?'':' style="opacity:.5"')+'><td><b>'+s.ma+'</b></td><td>'+s.ten+'</td>';
    h+='<td><span class="lbadge '+(s.loai==="BT"?"bp-dv":"bp-ss")+'">'+s.loai+'</span></td>';
    h+='<td>'+tuoiChips(s.tuoi)+'</td><td>'+(s.loai==="ĐB"?benhChips(s.benh):'<span class="sub">—</span>')+'</td>';
    h+='<td><input class="fcell" data-t="sua" data-i="'+i+'" data-k="bot" value="'+s.bot+'"></td>';
    h+='<td><input class="fcell" data-t="sua" data-i="'+i+'" data-k="nuoc" value="'+s.nuoc+'"></td>';
    h+='<td><input class="fcell" data-t="sua" data-i="'+i+'" data-k="tp" value="'+s.tp+'"></td>';
    h+='<td><button class="b sm '+(s.on?'grn':'red')+'" data-act="sgtog" data-i="'+i+'">'+(s.on?'Đang dùng':'Ngừng')+'</button></td></tr>';
  });
  h+='</table></div>';
  h+='<div style="margin-top:18px"><b style="font-size:13px">Bảng 2 — Soup sonde (4 loại)</b></div>';
  h+='<div style="overflow:auto;margin-top:8px"><table class="dmt"><tr><th>Mã</th><th>Tên</th><th>Nguyên liệu / suất</th><th>TP(ml)</th><th>Trạng thái</th></tr>';
  SOUP_CAT.forEach(function(s,i){
    h+='<tr'+(s.on?'':' style="opacity:.5"')+'><td><b>'+s.ma+'</b></td><td>'+s.ten+'</td>';
    h+='<td><input class="fcell" data-t="soup" data-i="'+i+'" data-k="nl" value="'+s.nl.replace(/"/g,"&quot;")+'" style="width:300px"></td>';
    h+='<td><input class="fcell" data-t="soup" data-i="'+i+'" data-k="tp" value="'+s.tp+'"></td>';
    h+='<td><button class="b sm '+(s.on?'grn':'red')+'" data-act="sstog" data-i="'+i+'">'+(s.on?'Đang dùng':'Ngừng')+'</button></td></tr>';
  });
  h+='</table></div>';
  h+='<div class="sub" style="margin-top:10px">Công thức là số liệu mock — KDD chỉnh trực tiếp trong ô (bột/nước/TP, nguyên liệu). Đây là cơ sở để khoa lâm sàng chọn mã và phòng sữa-soup tính nguyên liệu tiêu thụ.</div>';
  return h+'</div>';
}

function fchip(grp,val,label){var on=state[grp].indexOf(val)>=0;return '<span class="fchip'+(on?" on":"")+'" data-act="rtog" data-grp="'+grp+'" data-val="'+val+'">'+label+'</span>';}
function filteredSuat(){
  return SUAT.filter(function(s){
    if(!s.khoaGui)return false;
    if(state.rCu.length&&state.rCu.indexOf(s.gio)<0)return false;
    if(state.rKhoa.length&&state.rKhoa.indexOf(s.khoa)<0)return false;
    if(state.rLoai.length&&state.rLoai.indexOf(s.loai)<0)return false;
    if(state.rBp.length&&state.rBp.indexOf(LOAI[s.loai].bp)<0)return false;
    return true;
  });
}
function csvCell(v){return '"'+(""+v).replace(/"/g,'""')+'"';}
function ghiChuText(loai,p){return rowGhiChu([loai],p).replace("📝 ","");}
function dlCSV(name,csv){var blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();}
function exportCSV(){
  var rows=filteredSuat();
  var out=[["Ngay","Cu","Khoa","MaBN","Ten","Loai","MaCheDo","BoPhan","GhiChu"].map(csvCell).join(",")];
  rows.forEach(function(r){var p=PMAP[r.bnId];out.push([state.rNgay,r.gio,r.khoa,p.id,p.ten,LOAI[r.loai].full,maCheDo(r.loai,p),BO_PHAN[LOAI[r.loai].bp].ten,ghiChuText(r.loai,p)].map(csvCell).join(","));});
  dlCSV("bao-cao-suat-an_"+state.rNgay.replace(/\//g,"-")+".csv",out.join("\n"));
  showToast("Đã tải Excel — "+rows.length+" dòng");
}
function exportCuCSV(cu){
  var s=state.sent[cu];
  var out=[["Cu","BoPhan","Loai","Ten","Khoa"].map(csvCell).join(",")];
  s.list.forEach(function(r){out.push([cu,BO_PHAN[r.bp].ten,LOAI[r.loai].full,r.ten,r.khoa].map(csvCell).join(","));});
  dlCSV("phieu-giao-bep_"+cu.replace(":","")+".csv",out.join("\n"));
  showToast("Đã tải phiếu giao bếp cữ "+cu);
}
function baocaoHTML(){
  var rows=filteredSuat(),byLoai={},byKhoa={},side={cc:0,ss:0};
  rows.forEach(function(r){
    byLoai[r.loai]=(byLoai[r.loai]||0)+1;
    if(!byKhoa[r.khoa])byKhoa[r.khoa]={cc:0,ss:0,t:0};
    if(LOAI[r.loai].bp==="sua_soup"){side.ss++;byKhoa[r.khoa].ss++;}else{side.cc++;byKhoa[r.khoa].cc++;}
    byKhoa[r.khoa].t++;
  });
  var cuOpts=ALL_CU.slice().sort(function(a,b){return cuMin(a)-cuMin(b);});
  var h='<div class="card"><div class="rfilter">';
  h+='<div class="frow"><span class="flbl">Ngày</span><select id="rngay"><option'+(state.rNgay==="28/06/2026"?" selected":"")+'>28/06/2026</option><option'+(state.rNgay==="27/06/2026"?" selected":"")+'>27/06/2026</option></select></div>';
  h+='<div class="frow"><span class="flbl">Cữ</span>'+cuOpts.map(function(g){return fchip("rCu",g,g);}).join("")+'</div>';
  h+='<div class="frow"><span class="flbl">Khoa</span><span class="fkhoabox">'+KHOA_LIST.map(function(k){return fchip("rKhoa",k,k);}).join("")+'</span></div>';
  h+='<div class="frow"><span class="flbl">Loại</span>'+ALL_LOAI.map(function(l){return fchip("rLoai",l,LOAI[l].full);}).join("")+'</div>';
  h+='<div class="frow"><span class="flbl">Bộ phận</span>'+Object.keys(BO_PHAN).map(function(b){return fchip("rBp",b,BO_PHAN[b].ten);}).join("")+'</div>';
  h+='<div class="frow"><button class="b sm pri" data-act="excelreport">⬇ Tải Excel</button><button class="b sm" data-act="clearfilter">Bỏ lọc</button></div></div>';
  h+='<div class="row gap8 wrapf" style="margin:6px 0 12px">';
  h+='<div class="sent-cell" style="background:var(--grayLight)"><div style="font-size:11px;font-weight:800">Tổng suất</div><div style="font-size:22px;font-weight:800">'+rows.length+'</div></div>';
  h+='<div class="sent-cell bp-dv"><div style="font-size:11px;font-weight:800">Bên Cơm-Cháo</div><div style="font-size:22px;font-weight:800">'+side.cc+'</div></div>';
  h+='<div class="sent-cell bp-ss"><div style="font-size:11px;font-weight:800">Bên Sữa-Soup</div><div style="font-size:22px;font-weight:800">'+side.ss+'</div></div></div>';
  h+='<div style="margin-bottom:12px">'+ALL_LOAI.filter(function(l){return byLoai[l];}).map(function(l){return '<span class="chip '+BO_PHAN[LOAI[l].bp].cls+'">'+LOAI[l].full+' <span class="n">'+byLoai[l]+'</span></span>';}).join("")+'</div>';
  h+='<div class="sechead">THEO KHOA</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="text-align:left;color:var(--textLight)"><th style="padding:6px 8px">Khoa</th><th style="padding:6px 8px">Cơm-Cháo</th><th style="padding:6px 8px">Sữa-Soup</th><th style="padding:6px 8px">Tổng</th></tr>';
  Object.keys(byKhoa).sort().forEach(function(k){var x=byKhoa[k];h+='<tr style="border-top:1px solid var(--borderLight)"><td style="padding:6px 8px">'+k+'</td><td style="padding:6px 8px">'+x.cc+'</td><td style="padding:6px 8px">'+x.ss+'</td><td style="padding:6px 8px;font-weight:700">'+x.t+'</td></tr>';});
  h+='</table><div class="sub" style="margin-top:8px">Bảng tổng hợp theo lọc hiện tại. Bấm “Tải Excel” để lấy chi tiết từng suất.</div></div>';
  return h;
}

function render(){
  var ov="";
  if(state.bnModal)ov=bnModalHTML(state.bnModal.cu,state.bnModal.bnId);
  else if(state.tab==="dagui"&&state.sentDetail)ov=sentDetailHTML(state.sentDetail);
  root.innerHTML=headerHTML()+'<div class="wrap">'+bodyHTML()+'</div>'+ov;
}
function guiCu(cu){
  var rec=buildSent(cu);
  if(state.realMode&&window.SUAT_DB){
    if(rec.idsDuyet.length)window.SUAT_DB.updateTrangThai(rec.idsDuyet,"da_gui_sx");
    rec.rejIds.forEach(function(x){window.SUAT_DB.updateTrangThai([x.id],"kdd_tu_choi",x.lyDo);});
  }
  state.sent[cu]=rec;delete state.approved[cu];
  if(state.selCu===cu)state.selCu=null;
  showToast("Cữ "+cu+": gửi "+rec.list.length+" suất"+(rec.rejected.length?" · trả về khoa "+rec.rejected.length:""));render();
}
function setDecAll(cu,val){bnTrongCu(cu,true).forEach(function(b){state.decision[cu+"__"+b.bnId]=val;});}

root.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");if(!el)return;
  var act=el.dataset.act,cu=el.dataset.cu;
  if(act==="tab"){state.tab=el.dataset.tab;state.sel=null;if(state.tab!=="tracuu")state.dq="";render();}
  else if(act==="selcu"){state.selCu=cu;state.openKhoa={};state.dq="";state.fkhoa="";state.floai="";state.onlyFlag=false;render();}
  else if(act==="open"){state.selCu=cu;state.openKhoa={};render();}
  else if(act==="closepane"){state.selCu=null;render();}
  else if(act==="tgkhoa"){var k=el.dataset.khoa;state.openKhoa[k]=!state.openKhoa[k];render();}
  else if(act==="duyetkhoa"){bnTrongCu(cu,true).forEach(function(b){if(b.khoa===el.dataset.khoa)state.decision[cu+"__"+b.bnId]="duyet";});showToast("Đã duyệt khoa "+el.dataset.khoa);render();}
  else if(act==="duyetall"){setDecAll(cu,"duyet");state.approved[cu]=true;showToast("Đã duyệt tất cả cữ "+cu);render();}
  else if(act==="duyetgui"){setDecAll(cu,"duyet");guiCu(cu);}
  else if(act==="chuyen"){if(!el.dataset.block)guiCu(cu);}
  else if(act==="tick"){var key=el.dataset.key;state.decision[key]=((state.decision[key]||"duyet")==="duyet")?"tu_choi":"duyet";render();}
  else if(act==="bnmodal"){state.bnModal={cu:el.dataset.cu,bnId:el.dataset.bn};render();}
  else if(act==="closebn"){state.bnModal=null;render();}
  else if(act==="bntoggle"){var key2=el.dataset.key;state.decision[key2]=((state.decision[key2]||"duyet")==="duyet")?"tu_choi":"duyet";render();}
  else if(act==="sentdetail"){state.sentDetail=cu;render();}
  else if(act==="closesent"){state.sentDetail=null;render();}
  else if(act==="excelcu"){exportCuCSV(cu);}
  else if(act==="excelreport"){exportCSV();}
  else if(act==="rtog"){var g=el.dataset.grp,v=el.dataset.val,a=state[g],ix=a.indexOf(v);if(ix>=0)a.splice(ix,1);else a.push(v);render();}
  else if(act==="clearfilter"){state.rCu=[];state.rKhoa=[];state.rLoai=[];state.rBp=[];render();}
  else if(act==="sgtog"){SUA_CAT[+el.dataset.i].on=!SUA_CAT[+el.dataset.i].on;render();}
  else if(act==="sstog"){SOUP_CAT[+el.dataset.i].on=!SOUP_CAT[+el.dataset.i].on;render();}
  else if(act==="addsua"){showToast("Demo — bản thật mở form thêm mã sữa");}
  else if(act==="toggleflag"){state.onlyFlag=!state.onlyFlag;render();}
  else if(act==="sel"){state.sel=el.dataset.id;render();}
  else if(act==="back"){state.sel=null;render();}
});
root.addEventListener("change",function(e){var t=e.target;if(t.id==="fkhoa"){state.fkhoa=t.value;render();}else if(t.id==="floai"){state.floai=t.value;render();}else if(t.id==="rngay"){state.rNgay=t.value;render();}});
root.addEventListener("input",function(e){
  var t=e.target;
  if(t.classList.contains("fcell")){var arr=t.dataset.t==="sua"?SUA_CAT:SOUP_CAT,o=arr[+t.dataset.i],k=t.dataset.k;o[k]=(k==="nl")?t.value:(+t.value||0);return;}
  if(t.id==="search"){state.dq=t.value;var r=document.getElementById("tcres");if(r)r.innerHTML=tracuuResultsHTML();}
  else if(t.id==="dsearch"){state.dq=t.value;var d=document.getElementById("dlist");if(d)d.innerHTML=dlistHTML(state.selCu);}
  else if(t.classList.contains("reason")){
    var key=t.dataset.key;state.reason[key]=t.value;t.style.borderColor=t.value.trim()?"var(--border)":"var(--red)";
    var cu=state.selCu,elig=bnTrongCu(cu,true);
    var thieu=elig.some(function(b){var k=cu+"__"+b.bnId;return state.decision[k]==="tu_choi"&&!((state.reason[k]||"").trim());});
    var btn=document.getElementById("btnchuyen");
    if(btn){if(thieu){btn.dataset.block="1";btn.className="b pri block";}else{delete btn.dataset.block;btn.className="b pri";}}
  }
});

function fmtDob(d){if(!d)return"";var p=(""+d).split("T")[0].split("-");return p.length===3?(p[2]+"/"+p[1]+"/"+p[0]):(""+d);}
function clearData(){PATIENTS.length=0;SUAT.length=0;ALL_CU.length=0;for(var k in PMAP)delete PMAP[k];}
// ── G3-PR2: đảo ngược _chuanHoa — đọc cột chuẩn, fallback cột cũ (sẵn sàng G4) ──
var _CU_GIO={"01":"03:00","02":"06:00","03":"09:00","04":"11:00","05":"12:00","06":"15:00","07":"16:00","08":"17:00","09":"18:00","10":"21:00","11":"00:00"};
var _MON_LOAI={CPDV:"com_dv",ChPDV:"chao_dv","Cơm":"com_bl","Cháo":"chao_bl","Súp Sonde":"sonde"};
function _suaLoai(maSua){for(var i=0;i<SUA_CAT.length;i++)if(SUA_CAT[i].ma===maSua)return SUA_CAT[i].loai;return null;}
function _denorm(r){
  if((r.loai==null||r.loai==="")&&r.ma_mon!=null){
    if(r.ma_mon==="Sữa")r.loai=(_suaLoai(r.ma_che_do)==="ĐB")?"sua_db":"sua_bt";
    else if(_MON_LOAI[r.ma_mon])r.loai=_MON_LOAI[r.ma_mon];
  }
  if((r.cu==null||r.cu==="")&&r.cu_so!=null&&_CU_GIO[r.cu_so])r.cu=_CU_GIO[r.cu_so];
  if((r.khoa==null||r.khoa==="")&&r.ma_khoa!=null)r.khoa=r.ma_khoa;
  return r;
}
function rebuildFromDB(rows){
  clearData();state.sent={};
  rows.forEach(function(r){
    _denorm(r);
    var id=r.ma_bn||("BN"+r.id);
    if(!PMAP[id]){
      var p={id:id,ten:r.ho_ten||id,khoa:r.khoa||"—",phong:r.phong||"",giuong:r.giuong||"",
        khoaGui:true,chuY:null,nhom:r.nhom_tuoi||5,dob:fmtDob(r.ngay_sinh),
        dis:r.dis||"BT",suaCode:"",sondeCode:"",
        choNem:r.nem?"Nêm":"Không nêm",choXay:r.xay?"Xay":"Không xay",
        dd:{kcal:r.kcal||0,P:r.protein_g||0,L:r.lipid_g||0,G:r.glucid_g||0},
        ghiChu:r.ghi_chu||"",items:[]};
      PMAP[id]=p;PATIENTS.push(p);
    }
    var pp=PMAP[id];
    if((r.loai==="sua_bt"||r.loai==="sua_db")&&r.ma_che_do)pp.suaCode=r.ma_che_do;
    if(r.loai==="sonde"&&r.ma_che_do)pp.sondeCode=r.ma_che_do;
    if(r.dis&&r.dis!=="BT")pp.dis=r.dis;
    var it=null;for(var i=0;i<pp.items.length;i++){if(pp.items[i].loai===r.loai){it=pp.items[i];break;}}
    if(!it){it={loai:r.loai,gios:[]};pp.items.push(it);}
    if(it.gios.indexOf(r.cu)<0)it.gios.push(r.cu);
    SUAT.push({bnId:id,gio:r.cu,loai:r.loai,khoaGui:true,khoa:pp.khoa,dbId:r.id});
  });
  SUAT.map(function(s){return s.gio;}).forEach(function(g){if(ALL_CU.indexOf(g)<0)ALL_CU.push(g);});
}
function initSelDesktop(){
  if(typeof window!=="undefined"&&window.innerWidth>=1024){
    state.selCu=ALL_CU.filter(function(g){return !state.sent[g];}).sort(function(a,b){return cuDiff(a)-cuDiff(b);})[0]||null;
  }
}
function boot(){
  if(window.SUAT_DB&&window.SUAT_DB.configured()){
    state.realMode=true;
    Promise.resolve(window.SUAT_DB.fetchChoXuLy()).then(function(res){
      if(res&&res.error){showToast("Lỗi tải Supabase — chuyển demo",'var(--red)');state.realMode=false;}
      else{rebuildFromDB((res&&res.data)||[]);}
      initSelDesktop();render();
    }).catch(function(){state.realMode=false;initSelDesktop();render();});
  }else{
    state.realMode=false;initSelDesktop();render();
  }
}
boot();
})();
</script>
