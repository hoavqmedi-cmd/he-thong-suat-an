  .navi small{display:block;font-size:10px;font-weight:500;color:#6f8aa0}
  .navi:hover{background:rgba(255,255,255,.06)}
  .navi.on{background:var(--primary);color:#fff}
  .navi.on small{color:#cfe6f6}

  .main{flex:1;min-width:0}
  .top{background:#fff;border-bottom:1.5px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}

  .top .ds{font-size:11.5px;color:var(--textLight);margin-top:1px}

  .gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap14{gap:14px}.wrapf{flex-wrap:wrap}
  .sub{font-size:11px;color:var(--textLight)}
  .pill{font-size:11px;font-weight:700;color:var(--primary);background:var(--primaryLight);border-radius:6px;padding:2px 8px;display:inline-block}
  .badge{font-size:10px;font-weight:700;border-radius:99px;padding:3px 9px;display:inline-block}
  button{font-family:inherit;cursor:pointer}
  .b{padding:8px 13px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--textMid)}
  .b.out{border-color:var(--primary);color:var(--primary)}
  .b.pri{border:none;background:var(--primary);color:#fff}
  .b.grn{border:none;background:var(--green);color:#fff}
  .b.red{border-color:var(--red);color:var(--red);background:var(--redLight)}
  .b.sm{padding:5px 10px;font-size:11px}
  .tool{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;align-items:center}
  .tool input,.tool select{font-family:inherit;font-size:12px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text)}
  .seg{display:inline-flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:7px 13px;font-size:12px;font-weight:700;color:var(--textMid);border-right:1px solid var(--border)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--primary);color:#fff}

  table.t th{text-align:left;color:var(--textLight);font-weight:700;font-size:11px;padding:8px 10px;border-bottom:1.5px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}

  table.t tr:hover td{background:#FAFCFE}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .strong{font-weight:800}

  .note{font-size:11.5px;color:var(--textMid);background:var(--primaryLight);border:1px solid var(--primaryMid);border-radius:9px;padding:9px 12px;margin-bottom:13px}

  .lockbadge{background:var(--grayLight);color:var(--gray);border:1px dashed var(--grayMid);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700}
  .bar{height:7px;border-radius:4px;background:var(--grayLight);overflow:hidden;min-width:90px}

  .muted{text-align:center;padding:34px 0;color:var(--textLight)}

function showModal(title, fields, onSave){
  var host=document.getElementById("toastHost");
  var ov=el("div",{}); ov.style.cssText="position:fixed;inset:0;background:rgba(13,31,45,.45);display:flex;align-items:center;justify-content:center;z-index:300";
  var card=el("div",{class:"card"}); card.style.cssText="width:400px;max-width:92vw;margin:0;max-height:90vh;overflow:auto";
  card.appendChild(el("h3",null,title));
  var inputs={};
  fields.forEach(function(f){
    card.appendChild(el("div",{class:"sub",style:"margin:9px 0 3px"},f.label));
    var inp;
    if(f.type==="select"){
      inp=el("select"); inp.style.cssText="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px";
      f.options.forEach(function(o){var op=el("option",{value:o.v},o.t); if(o.v===(f.value||"")) op.setAttribute("selected","selected"); inp.appendChild(op);});
    } else {
      inp=el("input"); inp.style.cssText="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px"; if(f.value) inp.value=f.value;
    }
    card.appendChild(inp); inputs[f.key]=inp;
  });
  var row=el("div",{class:"row gap8",style:"margin-top:16px;justify-content:flex-end"});
  var cancel=el("button",{class:"b"},"Huỷ"); cancel.onclick=function(){ov.remove();};
  var ok=el("button",{class:"b pri"},"Lưu"); ok.onclick=function(){var vals={};for(var k in inputs)vals[k]=inputs[k].value;onSave(vals,function(){ov.remove();});};
  row.appendChild(cancel); row.appendChild(ok); card.appendChild(row);
  ov.appendChild(card); host.appendChild(ov);
}

    c.from("dm_khu_vuc").select("*").order("thu_tu",{ascending:true}),
    c.from("dm_khoa").select("ma,ten,thu_tu,khu_vuc").order("thu_tu",{ascending:true}),
    c.from("phan_cong_giao").select("*").order("ngay",{ascending:false}).limit(200),
    c.from("dm_bo_phan").select("*").order("ma",{ascending:true})
  ]).then(function(r){
    VAI_TRO_DB=(r[0]&&r[0].data)||[];
    USERS_DB  =(r[1]&&r[1].data)||[];
    ALLOW_DB  =(r[2]&&r[2].data)||[];
    KHUVUC_DB =(r[3]&&r[3].data)||[];
    KHOA_DB2  =(r[4]&&r[4].data)||[];
    PCG_DB    =(r[5]&&r[5].data)||[];
    BOPHAN_DB =(r[6]&&r[6].data)||[];
  }).catch(function(e){ console.error("[admin] loadAdminData lỗi:",e); });
}
function reloadAll(){ loadAdminData().then(boot); }

function afterLogin(){
  var c=getClient();
  state.src="loading"; render();
  c.from("nguoi_dung").select("*").eq("id",state.session.user.id).maybeSingle().then(function(r){
    state.me=(r&&r.data)||null;
    if(!state.me || state.me.vai_tro!=="admin"){ renderDenied(); return null; }
    return loadAdminData().then(boot);
  }).catch(function(e){ console.error("[admin] afterLogin lỗi:",e); renderDenied(); });
}
function init(){
  if(!configured()){ state.src="mock"; render(); return; }
  var c=getClient(); if(!c){ state.src="mock"; render(); return; }
  c.auth.getSession().then(function(res){
    state.session=(res&&res.data&&res.data.session)||null;
    if(!state.session){ renderLogin(); } else { afterLogin(); }
  });
  c.auth.onAuthStateChange(function(_e,sess){
    var was=!!state.session; state.session=sess;
    if(sess && !was){ afterLogin(); }
    else if(!sess){ state.me=null; renderLogin(); }
  });
}

/* ====================== BOOT — ĐỌC DỮ LIỆU THẬT ====================== */
function aggregate(rows){
  // ---- Phễu (funnel) ----
  var total=rows.length;
  var daGui=rows.filter(function(x){return x.trang_thai==="da_gui_sx";}).length;
  var tuChoi=rows.filter(function(x){return x.trang_thai==="kdd_tu_choi";}).length;
  FUNNEL=[
    {l:"Đăng ký",n:total,d:"khoa lâm sàng gửi",c:"var(--gray)"},
    {l:"Đã duyệt / gửi",n:daGui,d:"KDD đã chuyển SX",c:"var(--primary)"},
    {l:"Đã sản xuất",n:null,d:"chưa theo dõi (GĐ2)",c:"var(--orange)"},
    {l:"Đã giao",n:null,d:"chưa theo dõi (GĐ2)",c:"var(--green)"}
  ];
  // ---- KPI ----
  KPI=[
    {l:"Tỷ lệ giao thành công",v:"—",c:"var(--green)"},
    {l:"Tỷ lệ từ chối / trả về",v:(total?(tuChoi/total*100).toFixed(1).replace(".",","):"0")+"%",c:"var(--orange)"},
    {l:"Suất trả về bếp",v:tuChoi,c:"var(--red)"}
  ];
  // ---- Cữ × bộ phận ----
  function isBL(bp){return bp==="bep_benh_ly"||bp==="bep_bl";}
  var byCu={};
  rows.forEach(function(x){
    var cu=x.cu||"—"; if(!byCu[cu])byCu[cu]={cu:cu,dk:0,bep_dv:0,bep_bl:0,sua_soup:0,giao:"—",st:"wait"};
    byCu[cu].dk++;
    if(x.bo_phan==="bep_dv")byCu[cu].bep_dv++;
    else if(isBL(x.bo_phan))byCu[cu].bep_bl++;
  });
  CU_BP=Object.keys(byCu).sort().map(function(k){return byCu[k];});
  if(!CU_BP.length)CU_BP=[{cu:"—",dk:0,bep_dv:0,bep_bl:0,sua_soup:0,giao:"—",st:"wait"}];
  // ---- Cảnh báo (chỉ phần suy ra được từ dữ liệu thật) ----
  ALERTS=[];
  if(tuChoi>0)ALERTS.push({t:"yel",ic:"↩️",x:"KDD trả về <b>"+tuChoi+" suất</b> trong ngày — chờ khoa sửa (xem màn KDD)."});
  // ---- Sản lượng cơm-cháo theo bộ phận ----
  var sl={};
  rows.forEach(function(x){
    var bp=x.bo_phan; if(!bp)return;
    var name=bp==="bep_dv"?"Bếp phòng dịch vụ":(isBL(bp)?"Bếp cơm bệnh lý":bp);
    if(!sl[name])sl[name]={bp:name,com:0,chao:0,t:0};
    var f=x.loai_food||((x.loai||"").indexOf("chao")>-1?"chao":"com");
    if(f==="chao")sl[name].chao++;else sl[name].com++;
    sl[name].t++;
  });
  SL_COMCHAO=Object.keys(sl).map(function(k){return sl[k];});
  if(!SL_COMCHAO.length)SL_COMCHAO=[{bp:"(chưa có dữ liệu trong ngày)",com:0,chao:0,t:0}];
}

function boot(){
  if(!configured()){ state.src="mock"; render(); return; }
  var c=getClient();
  if(!c){ state.src="mock"; render(); return; }
  state.src="loading"; render();
  Promise.resolve()
    .then(function(){ return c.from("dang_ky_suat").select("*"); })
    .then(function(r){
      if(r.error) throw r.error;
      var rows=r.data||[];
      var days=rows.map(function(x){return x.ngay;}).filter(Boolean).sort();
      state.day=days.length?days[days.length-1]:null;
      var dayRows=state.day?rows.filter(function(x){return x.ngay===state.day;}):rows;
      aggregate(dayRows);
      // Danh mục nền (đọc song song)
      return Promise.all([
        c.from("dm_khoa").select("ten,thu_tu").order("thu_tu",{ascending:true}),
        c.from("dm_ma_benh").select("ma,mo_ta"),
        c.from("dm_nhom_tuoi").select("ma,mo_ta").order("ma",{ascending:true})
      ]);
    })
    .then(function(res){
      var k=res[0],b=res[1],t=res[2];
      if(k&&!k.error&&k.data&&k.data.length)KHOA=k.data.map(function(x){return x.ten;});
      if(b&&!b.error&&b.data&&b.data.length)DN_BENH=b.data.map(function(x){return [x.ma,x.mo_ta];});
      if(t&&!t.error&&t.data&&t.data.length)DN_TUOI=t.data.map(function(x){return x.mo_ta;});
      state.src="db"; render();
    })
    .catch(function(e){ console.error("[admin] boot lỗi:",e); state.src="mock"; render();
      toast("Không đọc được Supabase — đang hiển thị dữ liệu mẫu"); });
}

init();
})();
